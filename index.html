<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کافه پرواز</title>
<link rel="stylesheet" href="style.css">
</head>
<script src="script.js"></script>
<body>

<header>
<img id="logo" class="logo">
<h1>کافه پرواز</h1>
<p>شرکت هوانوردی عقاب آسمان شمال</p>
</header>

<div class="layout">

<!-- 🎥 ویدئو سمت چپ -->
<div class="videoBox">
<video autoplay muted loop>
<source src="video.mp4" type="video/mp4">
</video>
</div>

<!-- 🖼️ منو سمت راست -->
<div class="menuBox" id="menu"></div>

</div>

<!-- پنل -->
<button class="adminBtn" onclick="openPanel()">پنل مدیریت</button>

<div class="panel" id="panel">
<h2>پنل مدیریت</h2>

<input type="password" id="pass" placeholder="رمز">
<button onclick="login()">ورود</button>

<div id="adminArea" style="display:none">

<h3>افزودن محصول</h3>

<input id="name" placeholder="نام">
<input id="price" placeholder="قیمت">

<input type="file" id="img">

<button onclick="addItem()">افزودن</button>

</div>
</div>

<script>
let menu = JSON.parse(localStorage.getItem("menu")) || [];

// نمایش
function render(){
let box = document.getElementById("menu");
box.innerHTML="";

menu.forEach((item,i)=>{
box.innerHTML += `
<div class="card">
<img src="${item.img}">
<div class="info">
<p>${item.name}</p>
<span>${item.price} تومان</span>
</div>
</div>
`;
});
}
render();

// ورود
function login(){
if(document.getElementById("pass").value==="4030"){
document.getElementById("adminArea").style.display="block";
}else{
alert("رمز اشتباه است");
}
}

// افزودن
function addItem(){
let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let file = document.getElementById("img").files[0];

if(!name || !price || !file) return;

let reader = new FileReader();

reader.onload = function(){
menu.push({
name:name,
price:price,
img:reader.result
});

localStorage.setItem("menu",JSON.stringify(menu));
render();
};

reader.readAsDataURL(file);
}
</script>

</body>
</html>
